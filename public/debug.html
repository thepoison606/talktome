<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Intercom Debug</title>
</head>
<body>
  <h2>Debug Test</h2>
  <div id="debug"></div>
  
  <script>
    const debug = document.getElementById('debug');
    const addResult = (ok, text) => {
      const color = ok ? 'green' : 'red';
      debug.innerHTML += `<p style="color:${color}">${ok ? '✓' : '✗'} ${text}</p>`;
    };
    
    // Test 1: Check if server is running
    fetch('/').then(r => {
      addResult(true, 'Server is running');
    }).catch(e => {
      addResult(false, 'Server unreachable');
    });
    
    // Test 2: Check Socket.IO
    const script1 = document.createElement('script');
    script1.src = '/socket.io.js';
    script1.onload = () => {
      addResult(true, 'Socket.IO loaded');
    };
    script1.onerror = () => {
      addResult(false, 'Socket.IO not found');
    };
    document.head.appendChild(script1);
    
    // Test 3: Check currently used mediasoup-client path
    const paths = [
      '/node_modules/mediasoup-client/lib/index.js',
      '/node_modules/mediasoup-client/package.json'
    ];
    
    paths.forEach(path => {
      fetch(path).then(r => {
        if (r.ok) {
          addResult(true, `Found: ${path}`);
        } else {
          addResult(false, `Not found: ${path} (${r.status})`);
        }
      }).catch(e => {
        addResult(false, `Error: ${path}`);
      });
    });
    
    // Test 4: Recommendation
    setTimeout(() => {
      debug.innerHTML += '<h3>Recommendation:</h3>';
      debug.innerHTML += '<pre>npm list mediasoup-client socket.io mediasoup</pre>';
      debug.innerHTML += '<p>Run this command if one of the checks above fails.</p>';
    }, 1000);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk To Me Bridge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="status-panel">
        <div>
          <p class="eyebrow">Bridge client spike</p>
          <h1>Talk To Me Bridge</h1>
        </div>
        <div class="status-pill" id="connection-status">Local probe</div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Server registration</h2>
            <p>Announce this machine's local audio inventory to the Talk To Me server.</p>
          </div>
          <button id="announce-bridge" type="button">Announce</button>
        </div>
        <div class="server-grid">
          <label>
            <span>Server URL</span>
            <input id="server-url" type="url" autocomplete="url" />
          </label>
          <label>
            <span>API key</span>
            <input id="api-key" type="password" autocomplete="off" />
          </label>
          <label>
            <span>Bridge name</span>
            <input id="bridge-name" type="text" autocomplete="off" />
          </label>
        </div>
        <label class="checkbox-row startup-row">
          <input id="autostart-enabled" type="checkbox" />
          <span>Start bridge when signing in</span>
        </label>
        <div class="autostart-status" id="autostart-status"></div>
        <div class="probe-status" id="announce-status">Not announced.</div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Managed bridge ports</h2>
            <p>Loaded from the server and started automatically.</p>
          </div>
        </div>
        <div class="managed-port-list" id="bridge-ports"></div>
      </section>

      <section class="panel diagnostic-panel">
        <details>
          <summary>Local audio probe</summary>
          <div class="diagnostic-content">
            <div class="panel-header">
              <div>
                <h2>Manual loopback ports</h2>
              </div>
              <div class="button-row">
                <button id="add-port" type="button">Add port</button>
                <button id="stop-all-ports" type="button" disabled>Stop all</button>
              </div>
            </div>
            <div class="local-port-list" id="local-port-list"></div>
          </div>
        </details>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Audio devices</h2>
          </div>
          <button id="refresh-devices" type="button">Refresh</button>
        </div>
        <div class="summary-grid" id="device-summary"></div>
        <div class="device-list" id="device-list"></div>
      </section>

    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>

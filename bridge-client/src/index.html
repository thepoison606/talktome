<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk To Me Bridge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="tray-section">
        <div class="panel-header">
          <div class="registration-title">
            <h2>Server registration</h2>
            <div class="connection-line" id="announce-status" data-state="disconnected">
              <span></span>
              <strong>Disconnected</strong>
            </div>
          </div>
          <button id="announce-bridge" type="button">Save</button>
        </div>
        <div class="server-grid">
          <label>
            <span>Server IP/URL</span>
            <input id="server-url" type="url" autocomplete="url" />
          </label>
          <label>
            <span>API key</span>
            <input id="api-key" type="password" autocomplete="off" />
          </label>
          <label>
            <span>Bridge name</span>
            <input id="bridge-name" type="text" autocomplete="off" />
          </label>
        </div>
        <label class="checkbox-row startup-row">
          <input id="autostart-enabled" type="checkbox" />
          <span>Run at login</span>
        </label>
        <div class="autostart-status" id="autostart-status"></div>
      </section>

      <section class="tray-section">
        <div class="panel-header">
          <div>
            <h2>Managed bridge ports</h2>
            <p>Loaded from the server and started automatically.</p>
          </div>
        </div>
        <div class="managed-port-list" id="bridge-ports"></div>
      </section>

    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>

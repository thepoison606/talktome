name: Release Builds

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_script: build:win64
            executable_name: talktome_win64.exe
            worker_name: mediasoup-worker.exe
            artifact_prefix: talktome_windows_x64
          - name: macOS arm64
            os: macos-14
            build_script: build:mac_arm64
            executable_name: talktome_arm64
            worker_name: mediasoup-worker
            artifact_prefix: talktome_macos_arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18.20.4
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run ${{ matrix.build_script }}

      - name: Prepare release directory
        shell: bash
        run: |
          TS="$(date +%Y%m%d-%H%M%S)"
          RELEASE_DIR="${{ matrix.artifact_prefix }}_release_${TS}"
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"
          echo "ZIP_NAME=${RELEASE_DIR}.zip" >> "$GITHUB_ENV"
          node scripts/create-release-dir.js "$RELEASE_DIR" "${{ matrix.executable_name }}" "${{ matrix.worker_name }}"

      - name: Create zip and checksum
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import pathlib
          import zipfile

          release_dir = pathlib.Path(os.environ["RELEASE_DIR"])
          zip_name = pathlib.Path(os.environ["ZIP_NAME"])

          with zipfile.ZipFile(zip_name, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in release_dir.rglob("*"):
                  zf.write(path, path.relative_to(release_dir))

          digest = hashlib.sha256(zip_name.read_bytes()).hexdigest()
          checksum_path = zip_name.with_suffix(".sha256")
          checksum_path.write_text(f"{digest}  {zip_name.name}\n", encoding="utf-8")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_DIR }}_contents
          path: |
            ${{ env.RELEASE_DIR }}/

      - name: Upload release payload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_DIR }}_release_payload
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.RELEASE_DIR }}.sha256

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: docker build --tag talktome:${{ env.IMAGE_TAG }} .

      - name: Export Docker image artifact
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          docker save talktome:${IMAGE_TAG} | gzip > "talktome_docker_${IMAGE_TAG}.tar.gz"

      - name: Upload Docker image artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: talktome_docker_${{ env.IMAGE_TAG }}
          path: talktome_docker_${{ env.IMAGE_TAG }}.tar.gz

  publish-release:
    name: Publish draft release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build
      - docker

    steps:
      - name: Download release payload artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: "*_release_payload"
          merge-multiple: true
          path: release-assets

      - name: Show collected release assets
        shell: bash
        run: ls -la release-assets

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG} - macOS + Windows"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft=true --title "$TITLE"
          else
            gh release create "$TAG" --draft --title "$TITLE"
          fi

          gh release upload "$TAG" release-assets/* --clobber

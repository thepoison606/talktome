name: Release Builds

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_script: build:win64
            server_build_script: build:release:windows
            executable_name: talktome_win64.exe
            artifact_prefix: talktome_server_windows_x64
            artifact_glob: server-app/src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS arm64
            os: macos-14
            build_script: build:mac_arm64
            server_build_script: build:release:macos
            executable_name: talktome_arm64
            artifact_prefix: talktome_server_macos_arm64
            artifact_glob: server-app/src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18.20.4
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            VERSION="v${PACKAGE_VERSION}"
          fi

          SAFE_VERSION="${VERSION//\//-}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=$SAFE_VERSION" >> "$GITHUB_ENV"

      - name: Build package
        run: npm run ${{ matrix.build_script }}

      - name: Setup Node for server app
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install server app dependencies
        working-directory: server-app
        run: npm ci

      - name: Build server tray app
        working-directory: server-app
        env:
          TALKTOME_SERVER_SIDECAR_SOURCE: ${{ github.workspace }}/${{ matrix.executable_name }}
        run: npm run ${{ matrix.server_build_script }}

      - name: Prepare server app artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          shopt -s nullglob
          matches=( ${{ matrix.artifact_glob }} )
          if [[ ${#matches[@]} -ne 1 ]]; then
            printf 'Expected exactly one artifact for %s, found %s\n' "${{ matrix.artifact_glob }}" "${#matches[@]}" >&2
            exit 1
          fi

          source_file="${matches[0]}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            target_name="${{ matrix.artifact_prefix }}_${SAFE_VERSION}_setup.exe"
          else
            target_name="${{ matrix.artifact_prefix }}_${SAFE_VERSION}.dmg"
          fi

          target_path="release-artifacts/$target_name"
          cp "$source_file" "$target_path"
          echo "INSTALLER_NAME=$target_name" >> "$GITHUB_ENV"
          echo "INSTALLER_PATH=$target_path" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.INSTALLER_NAME }}
          path: ${{ env.INSTALLER_PATH }}

      - name: Upload installer to draft release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG} - macOS + Windows"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "$TITLE" || true
          fi

          gh release edit "$TAG" --draft=true --title "$TITLE"
          gh release upload "$TAG" "$INSTALLER_PATH" --clobber

  docker:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: linux-amd64
          - platform: linux/arm64
            arch: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Enable QEMU for cross-platform container builds
        shell: bash
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Create buildx builder
        shell: bash
        run: |
          docker buildx create --name talktome-builder --use
          docker buildx inspect --bootstrap

      - name: Build Docker image
        shell: bash
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --tag "talktome:${IMAGE_TAG}-${{ matrix.arch }}" \
            .

  docker-publish:
    name: Publish Docker image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/talktome
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/talktome
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

name: Release Builds

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_script: build:win64
            executable_name: talktome_win64.exe
            worker_name: mediasoup-worker.exe
            artifact_prefix: talktome_server_windows_x64
          - name: macOS arm64
            os: macos-14
            build_script: build:mac_arm64
            executable_name: talktome_arm64
            worker_name: mediasoup-worker
            artifact_prefix: talktome_server_macos_arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18.20.4
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            VERSION="v${PACKAGE_VERSION}"
          fi

          SAFE_VERSION="${VERSION//\//-}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=$SAFE_VERSION" >> "$GITHUB_ENV"

      - name: Build package
        run: npm run ${{ matrix.build_script }}

      - name: Prepare release directory
        shell: bash
        run: |
          RELEASE_DIR="${{ matrix.artifact_prefix }}_${SAFE_VERSION}"
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"
          echo "ZIP_NAME=${RELEASE_DIR}.zip" >> "$GITHUB_ENV"
          node scripts/create-release-dir.js "$RELEASE_DIR" "${{ matrix.executable_name }}" "${{ matrix.worker_name }}"

      - name: Create zip
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import zipfile

          release_dir = pathlib.Path(os.environ["RELEASE_DIR"])
          zip_name = pathlib.Path(os.environ["ZIP_NAME"])

          with zipfile.ZipFile(zip_name, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in release_dir.rglob("*"):
                  zf.write(path, path.relative_to(release_dir))
          PY

      - name: Create macOS app DMG
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          APP_NAME="Talktome Server"
          DMG_NAME="${{ matrix.artifact_prefix }}_${SAFE_VERSION}.dmg"
          node scripts/create-macos-app-bundle.js "$RELEASE_DIR" "$APP_NAME" "${{ matrix.executable_name }}" "$VERSION"
          bash scripts/create-macos-dmg.sh "$RELEASE_DIR" "$APP_NAME" "$DMG_NAME"
          echo "INSTALLER_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = "${{ matrix.artifact_prefix }}_${env:SAFE_VERSION}_setup.exe"
          makensis `
            "/DAPP_VERSION=${env:VERSION}" `
            "/DSOURCE_DIR=${env:GITHUB_WORKSPACE}\${env:RELEASE_DIR}" `
            "/DOUT_FILE=${env:GITHUB_WORKSPACE}\$installer" `
            "/DICON_FILE=${env:GITHUB_WORKSPACE}\bridge-client\src-tauri\icons\icon.ico" `
            "scripts\talktome-server-installer.nsi"
          "INSTALLER_NAME=$installer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_DIR }}_contents
          path: |
            ${{ env.RELEASE_DIR }}/
            ${{ env.ZIP_NAME }}
            ${{ env.INSTALLER_NAME }}

      - name: Upload release payload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_DIR }}_release_payload
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.INSTALLER_NAME }}

  docker:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: linux-amd64
          - platform: linux/arm64
            arch: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Enable QEMU for cross-platform container builds
        shell: bash
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Create buildx builder
        shell: bash
        run: |
          docker buildx create --name talktome-builder --use
          docker buildx inspect --bootstrap

      - name: Build Docker image
        shell: bash
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --tag "talktome:${IMAGE_TAG}-${{ matrix.arch }}" \
            --output "type=docker,dest=talktome_docker_${IMAGE_TAG}_${{ matrix.arch }}.tar" \
            .

      - name: Export Docker image artifact
        shell: bash
        run: |
          gzip -f "talktome_docker_${IMAGE_TAG}_${{ matrix.arch }}.tar"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v6
        with:
          name: talktome_docker_${{ env.IMAGE_TAG }}_${{ matrix.arch }}
          path: talktome_docker_${{ env.IMAGE_TAG }}_${{ matrix.arch }}.tar.gz

  docker-publish:
    name: Publish Docker image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/talktome
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/talktome
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-release:
    name: Publish draft release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build
      - docker
      - docker-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release payload artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: "*_release_payload"
          merge-multiple: true
          path: release-assets

      - name: Show collected release assets
        shell: bash
        run: ls -la release-assets

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG} - macOS + Windows"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft=true --title "$TITLE"
          else
            gh release create "$TAG" --draft --title "$TITLE"
          fi

          gh release upload "$TAG" release-assets/* --clobber

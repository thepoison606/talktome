name: Bridge Client Builds

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - ".github/workflows/bridge-client-release.yml"
      - "bridge-client/**"

concurrency:
  group: bridge-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Bridge ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            ffmpeg_source: macos-lgpl
            ffmpeg_sidecar: ffmpeg-aarch64-apple-darwin
            artifact_name: talktome_bridge_macos_arm64
            artifact_glob: bridge-client/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows x64
            os: windows-latest
            ffmpeg_source: windows-lgpl
            ffmpeg_sidecar: ffmpeg-x86_64-pc-windows-msvc.exe
            artifact_name: talktome_bridge_windows_x64
            artifact_glob: bridge-client/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bridge-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge-client/src-tauri

      - name: Install dependencies
        working-directory: bridge-client
        run: npm ci

      - name: Determine release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            PACKAGE_VERSION="$(node -p "require('./bridge-client/package.json').version")"
            VERSION="v${PACKAGE_VERSION}"
          fi

          SAFE_VERSION="${VERSION//\//-}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=$SAFE_VERSION" >> "$GITHUB_ENV"

      - name: Restore LGPL FFmpeg sidecar
        id: ffmpeg-sidecar
        uses: actions/cache@v4
        with:
          path: bridge-client/.ffmpeg-sidecars/${{ matrix.ffmpeg_sidecar }}
          key: ffmpeg-${{ runner.os }}-${{ hashFiles('bridge-client/scripts/build-ffmpeg-lgpl-*.sh') }}

      - name: Setup MSYS2
        if: matrix.ffmpeg_source == 'windows-lgpl' && steps.ffmpeg-sidecar.outputs.cache-hit != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            diffutils
            tar
            gzip
            xz
            curl
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-nasm

      - name: Build LGPL FFmpeg sidecar from source
        if: matrix.ffmpeg_source == 'macos-lgpl' && steps.ffmpeg-sidecar.outputs.cache-hit != 'true'
        working-directory: bridge-client
        run: scripts/build-ffmpeg-lgpl-macos.sh --release

      - name: Build Bridge with source-built FFmpeg
        if: matrix.ffmpeg_source == 'macos-lgpl'
        working-directory: bridge-client
        env:
          FFMPEG_SIDECAR_SOURCE: ${{ github.workspace }}/bridge-client/.ffmpeg-sidecars/ffmpeg-aarch64-apple-darwin
        run: npm run build:release:macos

      - name: Build LGPL FFmpeg sidecar from source
        if: matrix.ffmpeg_source == 'windows-lgpl' && steps.ffmpeg-sidecar.outputs.cache-hit != 'true'
        shell: msys2 {0}
        working-directory: bridge-client
        run: scripts/build-ffmpeg-lgpl-mingw.sh --release

      - name: Build Bridge with source-built FFmpeg
        if: matrix.ffmpeg_source == 'windows-lgpl'
        working-directory: bridge-client
        env:
          FFMPEG_SIDECAR_SOURCE: ${{ github.workspace }}/bridge-client/.ffmpeg-sidecars/ffmpeg-x86_64-pc-windows-msvc.exe
        run: npm run build:release:windows

      - name: Prepare Bridge artifact
        shell: bash
        run: |
          mkdir -p bridge-client/release-artifacts
          shopt -s nullglob
          matches=( ${{ matrix.artifact_glob }} )
          if [[ ${#matches[@]} -ne 1 ]]; then
            printf 'Expected exactly one artifact for %s, found %s\n' "${{ matrix.artifact_glob }}" "${#matches[@]}" >&2
            exit 1
          fi

          source_file="${matches[0]}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            target_name="${{ matrix.artifact_name }}_${SAFE_VERSION}_setup.exe"
          else
            target_name="${{ matrix.artifact_name }}_${SAFE_VERSION}.dmg"
          fi

          target_path="bridge-client/release-artifacts/$target_name"
          cp "$source_file" "$target_path"
          echo "BRIDGE_INSTALLER_NAME=$target_name" >> "$GITHUB_ENV"
          echo "BRIDGE_INSTALLER_PATH=$target_path" >> "$GITHUB_ENV"

      - name: Upload Bridge artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BRIDGE_INSTALLER_NAME }}
          if-no-files-found: error
          path: ${{ env.BRIDGE_INSTALLER_PATH }}

      - name: Upload Bridge artifact to draft release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG} - macOS + Windows"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "$TITLE" || true
          fi

          gh release edit "$TAG" --draft=true --title "$TITLE"
          gh release upload "$TAG" "$BRIDGE_INSTALLER_PATH" --clobber
